name: Release

# Publishes to npm, tags, and creates a GitHub release whenever the
# version in package.json changes on main. Pushes that do not bump the
# version are detected (version already on npm) and skipped gracefully.
#
# Authentication uses npm Trusted Publishing (OIDC): npm trusts this
# exact workflow through the id-token permission. No NPM_TOKEN secret
# is involved. Configure it once on npmjs.com: package settings →
# Trusted Publisher → GitHub Actions → faikidine/cwk, release.yml.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm 11.5.1 or newer.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Tests must pass before any release
        run: npm run check && npm test

      - name: Detect version change
        id: version
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already published — nothing to release."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is new — releasing."
          fi

      - name: Publish to npm (trusted publishing, no token)
        if: steps.version.outputs.publish == 'true'
        run: npm publish --provenance --access public

      - name: Create git tag
        if: steps.version.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
